<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1080, initial-scale=1" />
<title>You Alive — Ad A (Hero plein écran)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..700,0..100,0..1;1,9..144,300..700,0..100,0..1&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* ── Tokens a-manual-03 ──────────────────────────────────────── */
  :root {
    --cream: #F4EFE6;
    --forest: #1F2A22;
    --terra: #B5754E;
    --fraunces: "Fraunces", Georgia, serif;
    --quicksand: "Quicksand", system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #2b2b2b;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  /* Instagram Story canvas */
  .canvas {
    position: relative;
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: var(--forest);
    font-family: var(--quicksand);
    -webkit-font-smoothing: antialiased;
  }
  .canvas img.photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }
  /* Forest washes — same recipe as the site hero overlay */
  .flat {
    position: absolute;
    inset: 0;
    background: rgba(31, 42, 34, 0.16);
  }
  .grad {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(31, 42, 34, 0.66) 0%,
      rgba(31, 42, 34, 0.12) 30%,
      rgba(31, 42, 34, 0.12) 50%,
      rgba(31, 42, 34, 0.60) 74%,
      rgba(31, 42, 34, 0.96) 100%
    );
  }
  .stack {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: flex-end;
    text-align: right;
    padding: 230px 110px 0 110px;
  }
  h1 {
    font-family: var(--fraunces);
    font-variation-settings: "opsz" 144, "SOFT" 70;
    font-weight: 480;
    color: var(--cream);
    font-size: 176px;
    line-height: 0.98;
    letter-spacing: -0.02em;
    text-shadow: 0 2px 32px rgba(31, 42, 34, 0.55);
  }
  h1 .mark { color: var(--terra); }
  .subtitle {
    margin-top: 56px;
    font-family: var(--quicksand);
    font-weight: 600;
    color: var(--cream);
    font-size: 46px;
    line-height: 1.42;
    letter-spacing: 0.005em;
    text-shadow: 0 1px 20px rgba(31, 42, 34, 0.6);
  }
</style>
</head>
<body>
  <div class="canvas">
    <img class="photo" src="assets/hero-clean.jpeg" alt="Resting in a hammock, looking out through pines toward a distant town" />
    <div class="flat"></div>
    <div class="grad"></div>
    <div class="stack">
      <h1>You<br />Alive<span class="mark">?</span></h1>
      <p class="subtitle">Notify your loved ones<br />if something happens</p>
    </div>
  </div>
</body>
</html>
